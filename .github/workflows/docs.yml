name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/fakeish/src/**'
      - 'docs/site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build fakeish
        run: pnpm --filter @l4n3/fakeish build

      - name: Generate API docs
        run: pnpm --filter @l4n3/docs typedoc

      - name: Build static site
        run: pnpm --filter @l4n3/docs build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
